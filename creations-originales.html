<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Créations originales | Nathy Universe</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<section id="explorer" class="explorer">

    <div class="explorer-contenu">

        <h2>Créations originales</h2>


        <div class="galerie">

            <div class="creation" data-slug="reine-des-glaces">
                <img src="images/reine-des-glaces.png" alt="Reine des glaces"
                class="miniature">
                <h3>Reine des glaces</h3>
             
<div class="likes-container">

    <button class="btn-like">
        <img src="images/coeur-nathy.png"
             alt="J'aime"
             class="icone-coeur">
    </button>

    <span class="likes-count">0</span>

       <button class="btn-commentaire">
    <img src="images/bulle-commentaire.png"
         alt="Commentaires"
         class="icone-commentaire">
</button>

    <span class="comments-count">0</span>

</div>

<div class="commentaires-container">

    <h4>💬 Commentaires</h4>

    <p class="aucun-commentaire">
        Aucun commentaire pour le moment.
    </p>

    <label>Pseudo</label>

    <input
        type="text"
        class="champ-pseudo"
        placeholder="Votre pseudo (facultatif)"
        maxlength="30">

    <textarea
        class="champ-commentaire"
        placeholder="Écrire un commentaire..."></textarea>

    <button class="btn-publier">
        Publier
    </button>

    <div class="liste-commentaires"></div>

</div>
            </div>

            <div class="creation" data-slug="pirate-celeste">
                <img src="images/pirate-celeste.png" alt="Pirate céleste"

 <div class="likes-container">

    </div>
</div>

</section>

<div class="retour-accueil">
    <a href="index.html#explorer" class="btn-retour">← Retour aux catégories</a>
</div>

<div id="lightbox" class="lightbox">

    <span class="fermer-lightbox">&times;</span>

    <span class="fleche-lightbox fleche-gauche">&lsaquo;</span>

<img id="image-lightbox" src="" alt="Création en grand">


<span class="fleche-lightbox fleche-droite">&rsaquo;</span>

</div>
