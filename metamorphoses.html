<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fan Art | Nathy Universe</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<section id="explorer" class="explorer">

    <div class="explorer-contenu">

        <h2>Métamorphoses</h2>

        <p class="explorer-intro">
    Découvrez des créations où les formes, les matières et les identités se transforment pour donner naissance à de nouveaux univers.
</p>

        <div class="galerie">

            <div class="creation">
                <img src="images/dragon-fusion.png" alt="Dragon fusion">

                <h3>Dragon fusion</h3>
            </div>

            <div class="creation">
                <img src="images/fusion-serpent-blanc.png"
                     alt="Fusion serpent blanc"
                     class="image complete">

                <h3>Fusion serpent blanc</h3>
            </div>

            <div class="creation">
                <img src="images/fusion-serpent-noir.png"
                     alt="Fusion serpent noir"
                     class="image complete">

                <h3>Fusion serpent noir</h3>
            </div>

            <div class="creation">
                <img src="images/morphing-perruche.png"
                     alt="Morphing perruche"
                     class="image complete">

                <h3>Morphing perruche</h3>
            </div>

            <div class="creation">
                <img src="images/morphing-black-panther.png"
                     alt="Morphing black panther"
                     class="image complete">

                <h3>Morphing black panther</h3>
            </div>

        </div>

    </div>

</section>

<div class="retour-accueil">
    <a href="index.html#explorer" class="btn-retour">← Retour aux catégories</a>
</div>

<div id="lightbox" class="lightbox">

    <span class="fermer-lightbox">&times;</span>

    <span class="fleche-lightbox fleche-gauche">&lsaquo;</span>

    <img id="image-lightbox" src="" alt="Création en grand"> 

    <img src="images/nathy-n.png"
     alt="Emblème Nathy Universe"
     class="signature-lightbox">

    <span class="fleche-lightbox fleche-droite">&rsaquo;</span>

</div>

<script src="js/script.js"></script>

<script data-goatcounter="https://nathy-universe.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>

</html>
