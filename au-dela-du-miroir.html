<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fan Art | Nathy Universe</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<section id="explorer" class="explorer">

    <div class="explorer-contenu">

        <h2>Au-delà du miroir</h2>

        <p class="explorer-intro">
            Des créations où le réel se mêle à l'imaginaire, révélant d'autres réalités.
        </p>

        <div class="galerie">
           
            <div class="creation">
                <img src="images/reflexion.png"
                     alt="Réflexion"
                     class="image complete">

                <h3>Réflexion</h3>
            </div>

            <div class="creation">
                <img src="images/reflets-multiples.png" alt="Reflets multiples">

                <h3>Reflets multiples</h3>
            </div>

        </div>

    </div>

</section>

<div class="retour-accueil">
    <a href="index.html#explorer" class="btn-retour">← Retour aux catégories</a>
</div>

<div id="lightbox" class="lightbox">

    <span class="fermer-lightbox">&times;</span>

    <span class="fleche-lightbox fleche-gauche">&lsaquo;</span>

    <img id="image-lightbox" src="" alt="Création en grand"> 

    <img src="images/nathy-n.png"
     alt="Emblème Nathy Universe"
     class="signature-lightbox">

    <span class="fleche-lightbox fleche-droite">&rsaquo;</span>

</div>

<script src="js/script.js"></script>

<script data-goatcounter="https://nathy-universe.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>

</html>
