<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Créations originales | Nathy Universe</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<section id="explorer" class="explorer">

    <div class="explorer-contenu">

        <h2>Créations originales</h2>

        <p class="explorer-intro">
            Découvrez les créations nées de mon imagination. Chaque image raconte son propre univers.
        </p>

        <div class="galerie">

            <div class="creation">
                <img src="images/reine-des-glaces.png" alt="Reine des glaces">
                <h3>Reine des glaces</h3>
            </div>

            <div class="creation">
                <img src="images/pirate-celeste.png" alt="Pirate céleste">
                <h3>Pirate céleste</h3>
            </div>

        </div>

    </div>

</section>

<div class="retour-accueil">
    <a href="index.html" class="btn-retour">← Retour à l'accueil</a>
</div>

<div id="lightbox" class="lightbox">

    <span class="fermer-lightbox">&times;</span>

    <span class="fleche-lightbox fleche-gauche">&lsaquo;</span>

<img id="image-lightbox" src="" alt="Création en grand">

<img src="images/nathy-n.png"
     alt="Emblème Nathy Universe"
     class="signature-lightbox">

<span class="fleche-lightbox fleche-droite">&rsaquo;</span>

</div>

<script src="js/foret-vivante.js"></script>
<script src="js/script.js"></script>

</body>

</html>
