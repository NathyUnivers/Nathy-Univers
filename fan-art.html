<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fan Art | Nathy Universe</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<section id="explorer" class="explorer">

    <div class="explorer-contenu">

        <h2>Fan Art</h2>


        <div class="galerie">

            <div class="creation">
                <img src="images/harley-quinn.png" alt="Harley Quinn"
                     class="miniature complete"> 
                     
                <h3>Harley Quinn</h3>
                <div class="likes-container">
    <button class="btn-like">
        <img src="images/coeur-nathy.png"
             alt="J'aime"
             class="icone-coeur">
    </button>

    <span class="likes-count">0</span>
</div>
            </div>

            <div class="creation">
                <img src="images/deesse-de-l-illusion.png"
                     alt="Déesse de l'Illusion"
                     class="miniature complete">

                <h3>Déesse de l'Illusion</h3>
                <div class="likes-container">
    <button class="btn-like">
        <img src="images/coeur-nathy.png"
             alt="J'aime"
             class="icone-coeur">
    </button>

    <span class="likes-count">0</span>
</div>
            </div>

        </div>

    </div>

</section>

<div class="retour-accueil">
    <a href="index.html#explorer" class="btn-retour">← Retour aux catégories</a>
</div>

<div id="lightbox" class="lightbox">

    <span class="fermer-lightbox">&times;</span>

    <span class="fleche-lightbox fleche-gauche">&lsaquo;</span>

    <img id="image-lightbox" src="" alt="Création en grand"> 


    <span class="fleche-lightbox fleche-droite">&rsaquo;</span>

</div>

<script src="js/script.js"></script>

<script data-goatcounter="https://nathy-universe.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
